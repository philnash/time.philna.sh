<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f1f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2f5f9" media="(prefers-color-scheme: light)" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=15" />
    <title>TimeTime Zone</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-brand">
          <img class="brand-icon" src="/assets/icon.svg" alt="" aria-hidden="true" />
          <div>
          <h1>TimeTime Zone</h1>
          </div>
        </div>
        <div class="theme-toggle" role="group" aria-label="Theme mode">
          <button type="button" data-theme-choice="system" aria-label="System theme" aria-pressed="true">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 5h16v11H4z" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M9 19h6M12 16v3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span class="sr-only">System</span>
          </button>
          <button type="button" data-theme-choice="light" aria-label="Light theme" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span class="sr-only">Light</span>
          </button>
          <button type="button" data-theme-choice="dark" aria-label="Dark theme" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M14.5 3.2a8.5 8.5 0 1 0 6.3 13.6A8.8 8.8 0 0 1 14.5 3.2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
            <span class="sr-only">Dark</span>
          </button>
        </div>
      </header>

      <section class="panel controls" aria-label="Comparison controls">
        <div class="field">
          <label for="datetime">Date & Time</label>
          <input id="datetime" name="datetime" type="datetime-local" />
        </div>

        <div class="field field-search">
          <label for="city-search">Add City</label>
          <input id="city-search" name="city-search" type="search" placeholder="Search city or country" autocomplete="off" />
          <ul id="search-results" class="search-results" hidden></ul>
        </div>
      </section>

      <section class="panel">
        <div class="cities-header">
          <h2>Compared Cities</h2>
          <div class="share-link">
            <label for="route-preview">Share link</label>
            <div class="share-link-row">
              <input id="route-preview" class="route-preview-input" type="text" readonly />
              <button id="copy-link" class="copy-link" type="button" aria-label="Copy link to clipboard">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z" />
                </svg>
                <span class="sr-only">Copy link to clipboard</span>
              </button>
            </div>
          </div>
        </div>
        <ol id="cities" class="cities" aria-live="polite"></ol>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <template id="city-row-template">
      <li class="city-row">
        <article>
          <div class="city-main">
            <h3 class="city-name"></h3>
            <p class="city-meta"></p>
            <p class="city-zone-now"></p>
          </div>
          <div class="city-time">
            <p class="time-line"></p>
            <p class="date-line"></p>
            <p class="delta-line"></p>
            <div class="city-time-scrubber">
              <input
                class="city-time-slider"
                data-action="time-slider"
                type="range"
                min="0"
                max="1439"
                step="5"
              />
              <div class="city-time-scale" aria-hidden="true">
                <span>00</span>
                <span>06</span>
                <span>12</span>
                <span>18</span>
                <span>24</span>
              </div>
            </div>
          </div>
          <div class="city-actions">
            <button type="button" data-action="up" aria-label="Move city up">↑</button>
            <button type="button" data-action="down" aria-label="Move city down">↓</button>
            <button type="button" data-action="remove" aria-label="Remove city">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M9 9l6 6M15 9l-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <span class="sr-only">Remove city</span>
            </button>
          </div>
        </article>
      </li>
    </template>

    <script type="module" src="/app.js?v=12"></script>
  </body>
</html>
